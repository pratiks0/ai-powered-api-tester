# Generated by DropRun. Review before using for production.
services:
  - type: web
    name: ai-powered-api-tester-backend
    runtime: node
    plan: free
    repo: https://github.com/pratiks0/ai-powered-api-tester
    branch: main
    rootDir: api-tester/backend
    autoDeploy: true
    buildCommand: "npm install --no-fund --no-audit"
    startCommand: "npm run start"
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: HOST
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: NODE_ENV
        value: "development"
      - key: OPENAI_API_KEY
        value: "your-openai-api-key"
  - type: web
    name: ai-powered-api-tester-frontend
    runtime: node
    plan: free
    repo: https://github.com/pratiks0/ai-powered-api-tester
    branch: main
    rootDir: api-tester/frontend
    autoDeploy: true
    buildCommand: "npm install --no-fund --no-audit"
    startCommand: "npm run dev -- --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: "10000"
      - key: HOST
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NODE_ENV
        value: "development"
      - key: REACT_APP_API_URL
        sync: false
      - key: VITE_API_URL
        sync: false
