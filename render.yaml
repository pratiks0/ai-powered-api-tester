# Generated by DropRun. Review before using for production.
services:
  - type: web
    name: ai-powered-api-tester-backend
    runtime: node
    plan: free
    repo: https://github.com/pratiks0/ai-powered-api-tester
    branch: main
    rootDir: api-tester/backend
    autoDeploy: true
    buildCommand: "npm install --no-fund --no-audit || npm install --no-fund --no-audit --legacy-peer-deps"
    startCommand: "npm run start"
    envVars:
      - key: PORT
        value: "10000"
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
      - key: NODE_VERSION
        value: "20.18.0"
      - key: DATABASE_URL
        sync: false
      - key: HOST
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: NODE_ENV
        value: "development"
      - key: OPENAI_API_KEY
        value: "your-openai-api-key"
  - type: web
    name: ai-powered-api-tester-static
    runtime: static
    plan: free
    repo: https://github.com/pratiks0/ai-powered-api-tester
    branch: main
    rootDir: api-tester/frontend
    autoDeploy: true
    staticPublishPath: .
    buildCommand: "npm install --no-fund --no-audit --legacy-peer-deps && npm run build"
    envVars:
      - key: PORT
        value: "10000"
      - key: NPM_CONFIG_LEGACY_PEER_DEPS
        value: "true"
      - key: NODE_VERSION
        value: "20.18.0"
